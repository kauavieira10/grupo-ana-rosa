<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grupo Ana Rosa · Dashboard de Performance</title>

  <!-- Fontes: Inter (corpo) + Plus Jakarta Sans (títulos) — NÃO trocar -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Chart.js 4.4.0 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/v4-components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <span class="bg-blob-3" aria-hidden="true"></span>

  <div class="app">

    <!-- ================= HEADER ================= -->
    <header class="header glass">
      <div class="header__logo"><span id="logo-initials">AR</span></div>
      <div class="header__titles">
        <h1 class="header__client" id="client-name">Grupo Ana Rosa</h1>
        <span class="header__sub" id="client-sub">Saúde · período</span>
      </div>
      <div class="header__spacer"></div>

      <div class="header__actions">
        <!-- alternador de tema (lua/sol) -->
        <button class="icon-btn" id="btn-theme" title="Alternar tema" aria-label="Alternar tema">
          <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
          <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/></svg>
        </button>
        <!-- refresh -->
        <button class="icon-btn" id="btn-refresh" title="Atualizar dados" aria-label="Atualizar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
        </button>
        <!-- relatório (download) -->
        <button class="btn btn--primary" id="btn-report" title="Baixar relatório">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          <span>Relatório</span>
        </button>
      </div>

      <div class="header__agency">
        <img src="assets/logo-acesso-white.png" alt="Acesso" />
      </div>
    </header>

    <!-- ================= TOOLBAR ================= -->
    <div class="toolbar glass">
      <!-- tabs de view -->
      <div class="viewtabs">
        <button data-view="stats" class="is-active">Estatísticas</button>
        <button data-view="creatives">Criativos</button>
      </div>

      <div class="toolbar__spacer"></div>

      <span class="datasource fallback" id="datasource"><span class="dot"></span> Carregando…</span>

      <!-- filtro de período -->
      <div class="datefilter">
        <button class="btn" id="df-trigger" title="Filtrar período">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3Z"/></svg>
          <span id="df-label">Período todo</span>
        </button>
        <div class="datefilter__menu glass" id="df-menu">
          <button data-preset="7">Últimos 7 dias</button>
          <button data-preset="14">Últimos 14 dias</button>
          <button data-preset="30">Últimos 30 dias</button>
          <button data-preset="all" class="is-active">Período todo</button>
          <div class="datefilter__custom">
            <input type="date" id="df-start" aria-label="Início" />
            <input type="date" id="df-end" aria-label="Fim" />
          </div>
        </div>
      </div>

      <!-- segmented de plataforma -->
      <div class="segmented" role="tablist" aria-label="Plataforma">
        <button data-platform="all" aria-selected="true">Todas</button>
        <button data-platform="google" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.2h5.35c-.23 1.4-1.6 4.1-5.35 4.1A6.4 6.4 0 1 1 12 5.6c1.83 0 3.06.78 3.76 1.45l2.56-2.47C16.73 3.02 14.6 2 12 2a10 10 0 1 0 0 20c5.77 0 9.6-4.06 9.6-9.78 0-.66-.07-1.16-.25-1.12Z"/></svg>
          Google
        </button>
        <button data-platform="facebook" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12Z"/></svg>
          Meta
        </button>
      </div>
    </div>

    <!-- ================= VIEW: ESTATÍSTICAS ================= -->
    <section class="view is-active" data-viewname="stats">

      <div class="kpis" id="kpis"></div>

      <!-- gráfico combinado: Investimento × Leads acumulados -->
      <div class="grid grid--2">
        <div class="card glass">
          <div class="card__head">
            <div><div class="card__title">Investimento × Leads acumulados</div>
            <div class="card__sub">Evolução diária no período</div></div>
            <div class="legend">
              <span class="legend__item"><span class="legend__dot legend__dot--invest"></span> Investimento</span>
              <span class="legend__item"><span class="legend__dot legend__dot--leads"></span> Leads acum.</span>
            </div>
          </div>
          <div class="chart-wrap h-tall"><canvas id="chart-combined"></canvas></div>
        </div>

        <!-- donut: composição do investimento -->
        <div class="card glass">
          <div class="card__head"><div class="card__title">Composição do investimento</div></div>
          <div class="chart-wrap h-donut"><canvas id="chart-donut"></canvas></div>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>

      <!-- leads/dia e CPL/dia -->
      <div class="grid grid--halves">
        <div class="card glass">
          <div class="card__head"><div class="card__title">Leads por dia</div></div>
          <div class="chart-wrap h-mid"><canvas id="chart-leads"></canvas></div>
        </div>
        <div class="card glass">
          <div class="card__head"><div class="card__title">CPL por dia</div></div>
          <div class="chart-wrap h-mid"><canvas id="chart-cpl"></canvas></div>
        </div>
      </div>

      <!-- plataformas -->
      <div class="grid grid--halves" id="platforms"></div>

      <!-- funil Expad (ativo) -->
      <div class="grid"><div class="card glass" id="expad-card"></div></div>

      <!-- campanhas + insights -->
      <div class="grid grid--2">
        <div class="card glass">
          <div class="card__head"><div class="card__title">Top campanhas por investimento</div></div>
          <div id="campaigns"></div>
        </div>
        <div class="card glass">
          <div class="card__head"><div class="card__title">Insights</div></div>
          <div class="insights" id="insights"></div>
        </div>
      </div>

      <!-- projeção -->
      <div class="grid"><div class="card glass">
        <div class="card__head"><div class="card__title">Projeção do período</div></div>
        <div class="forecast" id="forecast"></div>
      </div></div>

      <!-- tabela de detalhamento -->
      <div class="grid"><div class="card glass">
        <div class="card__head"><div class="card__title">Detalhamento diário</div></div>
        <div id="detail-table"></div>
      </div></div>
    </section>

    <!-- ================= VIEW: CRIATIVOS (Meta) ================= -->
    <section class="view" data-viewname="creatives">
      <div class="toolbar glass" style="margin-bottom:20px">
        <div class="card__title">Criativos · Meta Ads</div>
        <div class="toolbar__spacer"></div>
        <!-- segmented de status de criativos -->
        <div class="segmented" role="tablist" aria-label="Status do criativo">
          <button data-creative="all" aria-selected="true">Todos</button>
          <button data-creative="active" aria-selected="false">Ativos</button>
          <button data-creative="paused" aria-selected="false">Pausados</button>
        </div>
      </div>
      <div class="creatives-grid" id="creatives-grid"></div>
    </section>

  </div><!-- /.app -->

  <!-- ============ SCRIPTS — ORDEM FIXA (seção 7, NÃO alterar) ============ -->
  <script src="js/config.js"></script>
  <script src="data/dataset.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/expad.js"></script>
  <script src="js/expad-qualified.js"></script>
  <script src="js/meta.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/kpis.js"></script>
  <script src="js/forecast.js"></script>
  <script src="js/platforms.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/campaigns.js"></script>
  <script src="js/table.js"></script>
  <script src="js/date-filter.js"></script>
  <script src="js/report.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
